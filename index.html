<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Lab - Mobile Synth</title>
    <style>
        :root {
            --naver-green: #03C75A;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas { display: block; }

        /* 드롭다운 메뉴 스타일 */
        .menu-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;
        }
        #menu-btn {
            background-color: var(--naver-green);
            color: white;
            border: none;
            padding: 10px 16px;
            font-weight: bold;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .menu-list {
            display: none; /* 기본은 숨김 */
            flex-direction: column;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-top: 5px;
            overflow: hidden;
        }
        .menu-list button {
            background: none;
            border: none;
            color: #ccc;
            padding: 12px 20px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1px solid #333;
        }
        .menu-list button:last-child { border-bottom: none; }
        .menu-list button.active {
            color: var(--naver-green);
            font-weight: bold;
            background-color: #262626;
        }

        /* 우측 상단 비주얼라이저 */
        #viz-container {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 120px; /* 세로화면 고려하여 약간 축소 */
            height: 50px;
            border: 1px solid #333;
            background: rgba(0,0,0,0.7);
            border-radius: 4px;
            pointer-events: none;
            z-index: 100;
        }

        #watermark {
            position: absolute; bottom: 15px; width: 100%;
            text-align: center; color: rgba(255, 255, 255, 0.15);
            font-weight: bold; letter-spacing: 1px;
            pointer-events: none; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <button id="menu-btn" onclick="toggleMenu()">Wave: SINE ▼</button>
        <div id="menu-list" class="menu-list">
            <button class="active" onclick="selectWave('sine', 'SINE')">SINE (순수함)</button>
            <button onclick="selectWave('triangle', 'TRI')">TRIANGLE (부드러움)</button>
            <button onclick="selectWave('sawtooth', 'SAW')">SAWTOOTH (날카로움)</button>
            <button onclick="selectWave('square', 'SQUR')">SQUARE (레트로)</button>
        </div>
    </div>

    <div id="viz-container">
        <canvas id="viz-canvas"></canvas>
    </div>

    <canvas id="main-canvas"></canvas>
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const vizCanvas = document.getElementById('viz-canvas');
        const vCtx = vizCanvas.getContext('2d');
        
        let audioCtx = null;
        let masterGain = null;
        let analyser = null;
        const activeTouches = {};
        let currentWaveType = 'sine';

        // 메뉴 토글 함수
        function toggleMenu() {
            const list = document.getElementById('menu-list');
            list.style.display = (list.style.display === 'flex') ? 'none' : 'flex';
        }

        // 파형 선택 함수
        function selectWave(type, label) {
            currentWaveType = type;
            document.getElementById('menu-btn').innerText = `Wave: ${label} ▼`;
            
            // 버튼 활성화 스타일 관리
            document.querySelectorAll('.menu-list button').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(label)) btn.classList.add('active');
            });
            
            toggleMenu(); // 선택 후 메뉴 닫기
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            vizCanvas.width = 120;
            vizCanvas.height = 50;
            render();
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                masterGain.connect(analyser);
                analyser.connect(audioCtx.destination);
                drawVisualizer();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            vCtx.fillStyle = '#000';
            vCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
            vCtx.lineWidth = 2;
            vCtx.strokeStyle = '#03C75A'; 
            vCtx.beginPath();

            const sliceWidth = vizCanvas.width / bufferLength;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * vizCanvas.height / 2;
                if (i === 0) vCtx.moveTo(x, y);
                else vCtx.lineTo(x, y);
                x += sliceWidth;
            }
            vCtx.lineTo(vizCanvas.width, vizCanvas.height / 2);
            vCtx.stroke();
        }

        function getFrequency(y) {
            return ((canvas.height - y) / canvas.height) * (1100 - 80) + 80;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222'; 
            ctx.lineWidth = 1;
            const step = 40;
            for (let x = 0; x <= canvas.width; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            Object.values(activeTouches).forEach(touch => {
                ctx.beginPath();
                ctx.arc(touch.x, touch.y, 40, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(3, 199, 90, 0.25)'; 
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.stroke();
            });
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();

            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                // 메뉴 영역 터치 시 소리 안 나게 예외 처리 가능 (여기서는 단순화)
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = currentWaveType;
                osc.frequency.setValueAtTime(getFrequency(t.clientY), audioCtx.currentTime);
                
                osc.connect(gain);
                gain.connect(masterGain);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.04);
                
                osc.start();
                activeTouches[t.identifier] = { x: t.clientX, y: t.clientY, osc: osc, gain: gain };
            }
            render();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const data = activeTouches[t.identifier];
                if (data) {
                    data.x = t.clientX;
                    data.y = t.clientY;
                    data.osc.frequency.setTargetAtTime(getFrequency(t.clientY), audioCtx.currentTime, 0.03);
                }
            }
            render();
        }, { passive: false });

        const stopTouch = (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const data = activeTouches[t.identifier];
                if (data) {
                    data.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                    data.osc.stop(audioCtx.currentTime + 0.12);
                    delete activeTouches[t.identifier];
                }
            }
            render();
        };

        canvas.addEventListener('touchend', stopTouch);
        canvas.addEventListener('touchcancel', stopTouch);

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
