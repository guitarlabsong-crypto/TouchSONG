<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Lab - Multi-Hz Synth</title>
    <style>
        :root {
            /* 7행: 다크 네이비 테마 색상 */
            --theme-color: #1B263B; 
            --text-light: #E0E0E0;
            --point-color: #00D4FF; /* 파형 및 수치 포인트 컬러 */
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas { display: block; }

        /* 드롭다운 메뉴 */
        .menu-container {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
        }
        #menu-btn {
            background-color: var(--theme-color);
            color: var(--text-light);
            border: 1px solid #415A77;
            padding: 10px 16px;
            font-weight: bold;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .menu-list {
            display: none; flex-direction: column;
            background-color: #0D1B2A;
            border: 1px solid #333;
            border-radius: 8px; margin-top: 5px; overflow: hidden;
        }
        .menu-list button {
            background: none; border: none; color: #ccc;
            padding: 12px 20px; text-align: left; font-size: 14px;
            border-bottom: 1px solid #1B263B;
        }
        .menu-list button.active {
            color: var(--point-color); font-weight: bold;
            background-color: #1B263B;
        }

        /* 우측 상단 정보 영역 (그래프 + Hz 수치) */
        .info-panel {
            position: absolute; top: 15px; right: 15px;
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 5px; z-index: 100;
        }
        #viz-container {
            width: 120px; height: 50px;
            border: 1px solid #333; background: rgba(0,0,0,0.8);
            border-radius: 4px; pointer-events: none;
        }
        /* 주파수 수치 표시 스타일 */
        #hz-display {
            color: var(--point-color);
            font-size: 8pt; /* 요청하신 8pt 크기 */
            font-family: monospace;
            text-align: right;
            line-height: 1.2;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }

        #watermark {
            position: absolute; bottom: 15px; width: 100%;
            text-align: center; color: rgba(255, 255, 255, 0.15);
            font-weight: bold; letter-spacing: 1px;
            pointer-events: none; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <button id="menu-btn" onclick="toggleMenu()">Wave: SINE ▼</button>
        <div id="menu-list" class="menu-list">
            <button class="active" onclick="selectWave('sine', 'SINE')">SINE</button>
            <button onclick="selectWave('triangle', 'TRI')">TRIANGLE</button>
            <button onclick="selectWave('sawtooth', 'SAW')">SAWTOOTH</button>
            <button onclick="selectWave('square', 'SQUR')">SQUARE</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="viz-container">
            <canvas id="viz-canvas"></canvas>
        </div>
        <div id="hz-display"></div>
    </div>

    <canvas id="main-canvas"></canvas>
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const vizCanvas = document.getElementById('viz-canvas');
        const vCtx = vizCanvas.getContext('2d');
        const hzDisplay = document.getElementById('hz-display');
        
        let audioCtx = null;
        let masterGain = null;
        let analyser = null;
        const activeTouches = {};
        let currentWaveType = 'sine';

        function toggleMenu() {
            const list = document.getElementById('menu-list');
            list.style.display = (list.style.display === 'flex') ? 'none' : 'flex';
        }

        function selectWave(type, label) {
            currentWaveType = type;
            document.getElementById('menu-btn').innerText = `Wave: ${label} ▼`;
            document.querySelectorAll('.menu-list button').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(label)) btn.classList.add('active');
            });
            toggleMenu();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            vizCanvas.width = 120;
            vizCanvas.height = 50;
            render();
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                masterGain.connect(analyser);
                analyser.connect(audioCtx.destination);
                updateLoop();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 통합 업데이트 루프 (비주얼라이저 + Hz 텍스트)
        function updateLoop() {
            requestAnimationFrame(updateLoop);
            
            // 1. 파형 그리기
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            vCtx.fillStyle = '#000';
            vCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
            vCtx.lineWidth = 2;
            vCtx.strokeStyle = '#00D4FF'; 
            vCtx.beginPath();
            const sliceWidth = vizCanvas.width / bufferLength;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * vizCanvas.height / 2;
                if (i === 0) vCtx.moveTo(x, y);
                else vCtx.lineTo(x, y);
                x += sliceWidth;
            }
            vCtx.lineTo(vizCanvas.width, vizCanvas.height / 2);
            vCtx.stroke();

            // 2. Hz 수치 업데이트
            const touchArray = Object.values(activeTouches);
            if (touchArray.length > 0) {
                // 여러 손가락일 경우 줄바꿈하여 표시
                hzDisplay.innerHTML = touchArray
                    .map((t, i) => `Touch ${i+1}: ${Math.round(t.hz)}Hz`)
                    .join('<br>');
            } else {
                hzDisplay.innerHTML = "";
            }
        }

        function getFrequency(y) {
            return ((canvas.height - y) / canvas.height) * (1200 - 80) + 80;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222'; 
            ctx.lineWidth = 1;
            const step = 40;
            for (let x = 0; x <= canvas.width; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            Object.values(activeTouches).forEach(touch => {
                ctx.beginPath();
                ctx.arc(touch.x, touch.y, 40, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 212, 255, 0.2)'; 
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.stroke();
            });
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const freq = getFrequency(t.clientY);
                
                osc.type = currentWaveType;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(masterGain);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.04);
                
                osc.start();
                activeTouches[t.identifier] = { x: t.clientX, y: t.clientY, hz: freq, osc: osc, gain: gain };
            }
            render();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const data = activeTouches[t.identifier];
                if (data) {
                    const freq = getFrequency(t.clientY);
                    data.x = t.clientX;
                    data.y = t.clientY;
                    data.hz = freq;
                    data.osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.03);
                }
            }
            render();
        }, { passive: false });

        const stopTouch = (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const data = activeTouches[t.identifier];
                if (data) {
                    data.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                    data.osc.stop(audioCtx.currentTime + 0.12);
                    delete activeTouches[t.identifier];
                }
            }
            render();
        };

        canvas.addEventListener('touchend', stopTouch);
        canvas.addEventListener('touchcancel', stopTouch);

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
