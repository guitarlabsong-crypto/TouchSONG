<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Touch Sine Synth</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* 브라우저 기본 터치 동작 방지 */
        }
        canvas { display: block; }
        #watermark {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: rgba(255, 255, 255, 0.2);
            font-weight: bold; letter-spacing: 2px;
            pointer-events: none; font-size: 14px;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let audioCtx = null;
        // 각 터치 정보를 저장할 객체 (Key: touch identifier)
        const activeTouches = {};

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }

        // 배경 그리드 및 모든 터치 포인트 그리기
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 그리드 그리기
            ctx.strokeStyle = '#222'; 
            ctx.lineWidth = 1;
            const step = 40;
            for (let x = 0; x <= canvas.width; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // 2. 활성화된 모든 터치 지점에 원 그리기
            Object.values(activeTouches).forEach(touch => {
                ctx.beginPath();
                ctx.arc(touch.x, touch.y, 40, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function getFrequency(y) {
            const minHz = 80;
            const maxHz = 1000;
            return ((canvas.height - y) / canvas.height) * (maxHz - minHz) + minHz;
        }

        // 터치 시작 시 오실레이터 생성
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();

            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(getFrequency(t.clientY), audioCtx.currentTime);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
                
                osc.start();

                // 터치 데이터 저장
                activeTouches[t.identifier] = {
                    x: t.clientX,
                    y: t.clientY,
                    osc: osc,
                    gain: gain
                };
            }
            render();
        }, { passive: false });

        // 터치 이동 시 주파수 및 위치 업데이트
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const data = activeTouches[t.identifier];
                if (data) {
                    data.x = t.clientX;
                    data.y = t.clientY;
                    data.osc.frequency.setTargetAtTime(getFrequency(t.clientY), audioCtx.currentTime, 0.03);
                }
            }
            render();
        }, { passive: false });

        // 터치 종료 시 해당 오실레이터만 정지
        const stopTouch = (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const data = activeTouches[t.identifier];
                if (data) {
                    data.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                    data.osc.stop(audioCtx.currentTime + 0.12);
                    delete activeTouches[t.identifier]; // 객체에서 삭제
                }
            }
            render();
        };

        canvas.addEventListener('touchend', stopTouch);
        canvas.addEventListener('touchcancel', stopTouch);

        window.addEventListener('resize', resize);
        resize();

    </script>
</body>
</html>
