<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Guitar Lab - Multi-Hz Synth Pro</title>
    <style>
        :root {
            --theme-color: #1B263B; 
            --text-light: #E0E0E0;
            --point-color: #00D4FF; 
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            /* 중요: 브라우저 기본 터치 액션을 완전히 비활성화 */
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }
        canvas { 
            display: block; 
            touch-action: none; /* 캔버스 영역 터치 강제 고정 */
        }

        /* 메뉴 및 정보 레이아웃 유지 */
        .menu-container { position: absolute; top: 15px; left: 15px; z-index: 1000; }
        #menu-btn {
            background-color: var(--theme-color);
            color: var(--text-light);
            border: 1px solid #415A77;
            padding: 10px 16px;
            font-weight: bold;
            border-radius: 8px;
            font-size: 14px;
        }
        .menu-list {
            display: none; flex-direction: column;
            background-color: #0D1B2A;
            border: 1px solid #333;
            border-radius: 8px; margin-top: 5px; overflow: hidden;
        }
        .menu-list button {
            background: none; border: none; color: #ccc;
            padding: 12px 20px; text-align: left; font-size: 14px;
            border-bottom: 1px solid #1B263B;
        }
        .menu-list button.active {
            color: var(--point-color); font-weight: bold;
            background-color: #1B263B;
        }

        .info-panel {
            position: absolute; top: 15px; right: 15px;
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 5px; z-index: 100;
        }
        #viz-container {
            width: 120px; height: 50px;
            border: 1px solid #333; background: rgba(0,0,0,0.8);
            border-radius: 4px;
        }
        #hz-display {
            color: var(--point-color);
            font-size: 8pt;
            font-family: monospace;
            text-align: right;
            line-height: 1.2;
        }

        #watermark {
            position: absolute; bottom: 15px; width: 100%;
            text-align: center; color: rgba(255, 255, 255, 0.15);
            font-weight: bold; letter-spacing: 1px;
            pointer-events: none; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <button id="menu-btn" onclick="toggleMenu(event)">Wave: SINE ▼</button>
        <div id="menu-list" class="menu-list">
            <button class="active" onclick="selectWave('sine', 'SINE')">SINE</button>
            <button onclick="selectWave('triangle', 'TRI')">TRIANGLE</button>
            <button onclick="selectWave('sawtooth', 'SAW')">SAWTOOTH</button>
            <button onclick="selectWave('square', 'SQUR')">SQUARE</button>
        </div>
    </div>

    <div class="info-panel">
        <div id="viz-container"><canvas id="viz-canvas"></canvas></div>
        <div id="hz-display"></div>
    </div>

    <canvas id="main-canvas"></canvas>
    <div id="watermark">SONG, YOUNG-MIN Guitar Lab</div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const vizCanvas = document.getElementById('viz-canvas');
        const vCtx = vizCanvas.getContext('2d');
        const hzDisplay = document.getElementById('hz-display');
        
        let audioCtx = null;
        let masterGain = null;
        let analyser = null;
        const activeTouches = {};
        let currentWaveType = 'sine';

        function toggleMenu(e) {
            e.stopPropagation(); // 터치 이벤트 전파 방지
            const list = document.getElementById('menu-list');
            list.style.display = (list.style.display === 'flex') ? 'none' : 'flex';
        }

        function selectWave(type, label) {
            currentWaveType = type;
            document.getElementById('menu-btn').innerText = `Wave: ${label} ▼`;
            document.querySelectorAll('.menu-list button').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(label)) btn.classList.add('active');
            });
            document.getElementById('menu-list').style.display = 'none';
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            vizCanvas.width = 120;
            vizCanvas.height = 50;
            render();
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                masterGain.connect(analyser);
                analyser.connect(audioCtx.destination);
                updateLoop();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function updateLoop() {
            requestAnimationFrame(updateLoop);
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            vCtx.fillStyle = '#000';
            vCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);
            vCtx.lineWidth = 2;
            vCtx.strokeStyle = '#00D4FF'; 
            vCtx.beginPath();
            const sliceWidth = vizCanvas.width / bufferLength;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * vizCanvas.height / 2;
                if (i === 0) vCtx.moveTo(x, y);
                else vCtx.lineTo(x, y);
                x += sliceWidth;
            }
            vCtx.lineTo(vizCanvas.width, vizCanvas.height / 2);
            vCtx.stroke();

            const touchArray = Object.values(activeTouches);
            hzDisplay.innerHTML = touchArray.length > 0 
                ? touchArray.map((t, i) => `T${i+1}: ${Math.round(t.hz)}Hz`).join('<br>') 
                : "";
        }

        function getFrequency(y) {
            return ((canvas.height - y) / canvas.height) * (1200 - 80) + 80;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#222'; 
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += 40) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            Object.values(activeTouches).forEach(touch => {
                ctx.beginPath();
                ctx.arc(touch.x, touch.y, 40, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 212, 255, 0.25)'; 
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.stroke();
            });
        }

        // 터치 인식 강화 핵심 로직
        const handleStart = (e) => {
            e.preventDefault();
            e.stopPropagation(); // 상위 제스처 방해 금지
            initAudio();

            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (activeTouches[t.identifier]) continue;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const freq = getFrequency(t.clientY);
                
                osc.type = currentWaveType;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(masterGain);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.04);
                
                osc.start();
                activeTouches[t.identifier] = { x: t.clientX, y: t.clientY, hz: freq, osc: osc, gain: gain };
            }
            render();
        };

        const handleMove = (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const data = activeTouches[t.identifier];
                if (data) {
                    const freq = getFrequency(t.clientY);
                    data.x = t.clientX;
                    data.y = t.clientY;
                    data.hz = freq;
                    data.osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.03);
                }
            }
            render();
        };

        const handleEnd = (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const data = activeTouches[t.identifier];
                if (data) {
                    data.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                    data.osc.stop(audioCtx.currentTime + 0.12);
                    delete activeTouches[t.identifier];
                }
            }
            render();
        };

        // 이벤트 리스너 등록 (passive: false 중요)
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleEnd, { passive: false });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
